<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>ORC SURVIVOR 〜5分間、勇者を返り討て〜</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='6' width='24' height='20' rx='4' fill='%235d9b45'/%3E%3Crect x='9' y='13' width='5' height='3' fill='%23ff2e1f'/%3E%3Crect x='18' y='13' width='5' height='3' fill='%23ff2e1f'/%3E%3Cpath d='M9 26 L11 19 L13 26 Z' fill='%23efe8d8'/%3E%3Cpath d='M23 26 L21 19 L19 26 Z' fill='%23efe8d8'/%3E%3C/svg%3E" />
  <meta name="description" content="あなたはオーク。無限に湧いてくる勇者の大群を薙ぎ払い、5分間生き残れ。ブラウザで今すぐ遊べる立場逆転サバイバー。" />
  <meta property="og:title" content="ORC SURVIVOR 〜5分間、勇者を返り討て〜" />
  <meta property="og:description" content="あなたはオーク。無限に湧いてくる勇者の大群を薙ぎ払い、5分間生き残れ。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://t3q4awmhsub1-hue.github.io/ORC_SURVIVOR/" />
  <meta property="og:image" content="https://t3q4awmhsub1-hue.github.io/ORC_SURVIVOR/ogp.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <style>
    :root {
      --green: #5d9b45;
      --dark: #131a10;
      --panel: rgba(15, 22, 12, 0.92);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; overflow: hidden; background: var(--dark);
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', system-ui, sans-serif;
      color: #e8eee0; user-select: none;
      touch-action: none; overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }
    .hidden { display: none !important; }
    #game canvas { display: block; }

    /* 被弾ビネット */
    #vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 6; opacity: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(200, 30, 20, 0.55) 100%);
    }
    #vignette.flash { animation: vignette 0.45s ease-out; }
    @keyframes vignette { 0% { opacity: 1; } 100% { opacity: 0; } }

    /* HUD */
    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
    #timer {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      font-size: 44px; font-weight: 900; text-shadow: 0 2px 8px rgba(0,0,0,.6);
      letter-spacing: 2px;
    }
    #timer.final { color: #ff5544; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.55; } }
    #status { position: absolute; top: 16px; left: 16px; width: 280px; }
    #hpbar, #expbar {
      height: 16px; background: rgba(0,0,0,.55); border: 2px solid rgba(255,255,255,.25);
      border-radius: 8px; overflow: hidden; margin-bottom: 6px;
    }
    #expbar { height: 8px; }
    #hpfill { height: 100%; width: 100%; background: linear-gradient(#7ed957, #4a9c2d); transition: width .15s, background .3s; }
    #hpbar.low { animation: pulse 0.7s infinite; border-color: rgba(255, 85, 68, .8); }
    #hpbar.low #hpfill { background: linear-gradient(#ff7a5c, #d4351c); }
    #expfill { height: 100%; width: 0%; background: linear-gradient(#ffe97a, #e8b923); transition: width .15s; }
    #lvl { font-weight: 900; font-size: 15px; margin-bottom: 4px; text-shadow: 0 1px 4px #000; }
    #skill-icons { font-size: 15px; margin-top: 4px; text-shadow: 0 1px 4px #000; letter-spacing: 1px; }
    #kills {
      position: absolute; top: 18px; right: 18px; font-size: 28px; font-weight: 900;
      text-shadow: 0 2px 8px rgba(0,0,0,.6);
    }
    /* 仮想スティック */
    #stick-base {
      display: none; position: fixed; z-index: 14; width: 120px; height: 120px;
      margin: -60px 0 0 -60px; border-radius: 50%;
      background: rgba(255,255,255,.08); border: 2px solid rgba(255,255,255,.3);
      pointer-events: none;
    }
    #stick-knob {
      position: absolute; left: 50%; top: 50%; width: 52px; height: 52px;
      border-radius: 50%; background: rgba(125, 217, 87, .55);
      border: 2px solid rgba(255,255,255,.5);
      transform: translate(-50%, -50%);
    }

    /* HUD右下の小ボタン（モバイル用。PCでも害なし） */
    #hud-buttons {
      position: absolute; bottom: 16px; right: 14px; display: flex; gap: 10px;
      pointer-events: auto;
    }
    #hud-buttons button {
      width: 46px; height: 46px; padding: 0; border-radius: 50%;
      background: rgba(15, 22, 12, .6); border: 1px solid rgba(255,255,255,.25);
      font-size: 20px; line-height: 1;
    }

    #relic-icons {
      position: absolute; top: 56px; right: 18px; font-size: 22px; letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(255, 122, 240, .8), 0 1px 4px #000;
    }
    #toasts {
      position: absolute; top: 76px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 6px; align-items: center;
    }
    .toast {
      background: rgba(15, 22, 12, 0.85); border: 1px solid rgba(125, 217, 87, 0.5);
      border-radius: 9px; padding: 7px 18px; font-size: 15px; font-weight: 700;
      animation: toastIn 0.25s ease, vignette 0.6s ease-in 2.4s forwards;
    }
    .toast.legendary {
      border-color: #ff7af0; color: #ffe9fb; font-size: 17px;
      box-shadow: 0 0 24px rgba(255, 122, 240, 0.45);
      animation: toastIn 0.25s ease, vignette 0.8s ease-in 4.2s forwards;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; } }
    #bossbar {
      position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%);
      width: min(640px, 80vw); height: 20px; background: rgba(0,0,0,.6);
      border: 2px solid #ff5544; border-radius: 10px; overflow: hidden;
    }
    #bossbar span {
      position: absolute; inset: 0; text-align: center; font-size: 13px; font-weight: 900;
      line-height: 20px; color: #fff; text-shadow: 0 1px 3px #000;
    }
    #bossfill { height: 100%; width: 100%; background: linear-gradient(#ff7a5c, #d4351c); transition: width .2s; }
    #warning {
      position: absolute; top: 30%; left: 50%; transform: translateX(-50%);
      font-size: 38px; font-weight: 900; color: #ff5544; white-space: nowrap;
      text-shadow: 0 2px 12px rgba(0,0,0,.8); animation: pulse 0.6s infinite;
    }

    /* スクリーン共通 */
    .screen {
      position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px; background: rgba(8, 12, 6, 0.72);
      text-align: center;
    }
    button {
      font-family: inherit; font-size: 18px; font-weight: 700; color: #fff;
      background: var(--green); border: none; border-radius: 10px;
      padding: 12px 30px; cursor: pointer; transition: transform .08s, filter .15s;
    }
    button:hover { filter: brightness(1.15); transform: translateY(-1px); }
    button.ghost { background: transparent; border: 1px solid #3a4a33; color: #9eb18c; font-size: 14px; padding: 8px 20px; }

    /* タイトル（背面の3Dアトラクトを透かす） */
    #title-screen {
      background: radial-gradient(ellipse at center, rgba(31, 48, 23, 0.55) 0%, rgba(10, 16, 7, 0.88) 85%);
    }
    .logo {
      margin: 0; font-size: clamp(56px, 12vw, 120px); line-height: 0.95; font-weight: 900;
      color: var(--green);
      text-shadow: 0 4px 0 #2c4a20, 0 8px 24px rgba(0,0,0,.7);
      letter-spacing: 4px;
      animation: logoGlow 3.2s ease-in-out infinite alternate;
    }
    @keyframes logoGlow {
      from { text-shadow: 0 4px 0 #2c4a20, 0 8px 24px rgba(0,0,0,.7); }
      to { text-shadow: 0 4px 0 #2c4a20, 0 8px 24px rgba(0,0,0,.7), 0 0 42px rgba(125, 217, 87, .65); }
    }
    #start { animation: startPulse 2.2s ease-in-out infinite; }
    #stage-select { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .stage {
      display: flex; flex-direction: column; gap: 2px; align-items: center;
      background: rgba(15, 22, 12, 0.7); border: 2px solid #3a4a33;
      font-size: 15px; padding: 10px 18px; color: #c9d6bb;
    }
    .stage small { font-size: 11px; color: #8a9a7a; font-weight: 400; }
    .stage.on { border-color: var(--green); color: #fff; background: rgba(45, 70, 35, 0.8); }
    .stage.on small { color: #aed39a; }
    @keyframes startPulse { 50% { transform: scale(1.05); filter: brightness(1.12); } }
    #volume-label { display: flex; align-items: center; gap: 10px; font-weight: 700; color: #c9d6bb; }
    #volume { width: 200px; accent-color: var(--green); }
    .tagline { font-size: clamp(16px, 3vw, 24px); margin: 4px 0 6px; color: #c9d6bb; font-weight: 700; }
    #highscore { color: #ffd34d; font-weight: 700; min-height: 1.2em; margin: 0; }
    .controls { color: #9eb18c; font-size: 14px; margin-top: 18px; }
    .credit { color: #5f7050; font-size: 11px; margin-top: 2px; }

    /* プロローグ */
    #prologue {
      background: #050803;
      cursor: pointer; justify-content: flex-end; gap: 0; padding-bottom: 84px;
    }
    #prologue-scene { position: absolute; inset: 0; }
    #prologue-scene canvas { display: block; }
    #prologue-scrim {
      position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(to bottom,
        rgba(5, 8, 3, 0.25) 0%, rgba(5, 8, 3, 0) 30%,
        rgba(5, 8, 3, 0) 45%, rgba(5, 8, 3, 0.82) 82%, rgba(5, 8, 3, 0.92) 100%);
    }
    #prologue-text {
      position: relative; max-width: 760px; padding: 0 24px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .story-line {
      margin: 0; font-size: clamp(15px, 2.4vw, 21px); line-height: 1.85; color: #e4ead8;
      text-shadow: 0 1px 3px rgba(0,0,0,.9), 0 0 18px rgba(0,0,0,.6);
      opacity: 0; animation: storyIn 1.1s ease forwards;
    }
    .story-line.em { color: #ffe97a; font-weight: 900; font-size: clamp(18px, 3vw, 26px); }
    @keyframes storyIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
    #prologue-hint {
      position: absolute; bottom: 26px; right: 30px; font-size: 13px; color: #7a8a6a;
      animation: pulse 2.4s infinite;
    }
    #prologue-dots { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #3a4a33; }
    .dot.on { background: #7ed957; }

    /* エンディング（映画調） */
    #ending { position: fixed; inset: 0; z-index: 22; background: #000; cursor: pointer; }
    #ending-scene { position: absolute; inset: 0; animation: endingFade 1.6s ease; }
    #ending-scene canvas { display: block; }
    @keyframes endingFade { from { opacity: 0; } to { opacity: 1; } }
    .letterbox {
      position: absolute; left: 0; right: 0; height: 11vh; background: #000; z-index: 2;
    }
    .letterbox.top { top: 0; transform: translateY(-100%); animation: boxIn 1.4s ease forwards; }
    .letterbox.bottom { bottom: 0; transform: translateY(100%); animation: boxIn 1.4s ease forwards; }
    @keyframes boxIn { to { transform: translateY(0); } }
    #ending-subtitle {
      position: absolute; bottom: 13.5vh; left: 0; right: 0; z-index: 3; margin: 0;
      text-align: center; color: #f3efe2; font-size: clamp(17px, 2.6vw, 26px);
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'MS PMincho', serif;
      letter-spacing: 0.14em; text-shadow: 0 1px 4px rgba(0,0,0,.95), 0 0 22px rgba(0,0,0,.7);
      opacity: 0;
    }
    #ending-subtitle.show { animation: subIn 0.9s ease forwards; }
    @keyframes subIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    #ending-fin {
      position: absolute; inset: 0; z-index: 4; background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
      animation: endingFade 2.2s ease;
    }
    #ending-fin h2 {
      margin: 0; font-size: clamp(40px, 8vw, 84px); font-weight: 900; color: var(--green);
      letter-spacing: 6px; text-shadow: 0 4px 0 #2c4a20;
    }
    #ending-fin p {
      margin: 0; color: #cfd9c2; font-size: clamp(16px, 2.4vw, 24px); letter-spacing: 0.5em;
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    }
    #ending-hint {
      position: absolute; bottom: 3.5vh; right: 30px; z-index: 5; font-size: 12px; color: #6a7a5a;
    }

    /* レベルアップ */
    #levelup h2 {
      font-size: 42px; margin: 0 0 8px; color: #ffe97a; font-weight: 900;
      text-shadow: 0 2px 10px rgba(0,0,0,.6);
    }
    #choices { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .choice {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      width: 220px; padding: 22px 16px; background: var(--panel);
      border: 2px solid rgba(125, 217, 87, 0.5); border-radius: 14px; color: #e8eee0;
      animation: cardIn 0.32s cubic-bezier(0.18, 0.9, 0.3, 1.3) backwards;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(26px) scale(0.88); }
      to { opacity: 1; transform: none; }
    }
    .choice:hover { border-color: #ffe97a; transform: translateY(-3px); }
    .choice-key {
      font-size: 12px; background: rgba(255,255,255,.15); border-radius: 6px; padding: 2px 8px;
    }
    .choice-icon { font-size: 44px; line-height: 1; }
    .choice-name { font-size: 17px; font-weight: 900; }
    .choice-name em { font-style: normal; color: #ffe97a; font-size: 12px; display: block; }
    .choice-desc { font-size: 13px; color: #b7c4a8; }

    /* リザルト */
    #result { gap: 10px; }
    #result-headline { font-size: clamp(22px, 4.5vw, 38px); margin: 0; font-weight: 900; }
    #result-story {
      max-width: 640px; margin: 0; padding: 0 20px; font-size: 15px; line-height: 1.8;
      color: #cfd9c2;
    }
    #result-headline.won { color: #ffd34d; }
    #result-headline.lost { color: #ff7a5c; }
    #result-stats { display: flex; gap: 22px; flex-wrap: wrap; justify-content: center; }
    .stat { display: flex; flex-direction: column; font-size: 13px; color: #9eb18c; }
    .stat strong { font-size: 20px; color: #fff; }
    .stat em { font-style: normal; color: #ffd34d; }
    #card {
      width: min(560px, 86vw); border-radius: 10px; border: 2px solid rgba(255,255,255,.2);
      box-shadow: 0 10px 40px rgba(0,0,0,.5);
    }
    .result-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .result-buttons .secondary { background: #3a4a33; }
    #share-x { background: #111; border: 1px solid #444; }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="vignette"></div>

  <div id="hud" class="hidden">
    <div id="timer">10:00</div>
    <div id="status">
      <div id="lvl">Lv1</div>
      <div id="hpbar"><div id="hpfill"></div></div>
      <div id="expbar"><div id="expfill"></div></div>
      <div id="skill-icons"></div>
    </div>
    <div id="kills">⚔ 0</div>
    <div id="relic-icons"></div>
    <div id="toasts"></div>
    <div id="hud-buttons">
      <button id="btn-mute" aria-label="ミュート">🔊</button>
      <button id="btn-pause" aria-label="ポーズ">⏸</button>
    </div>
    <div id="bossbar" class="hidden"><div id="bossfill"></div><span>真の勇者</span></div>
    <div id="warning" class="hidden">⚠ 真の勇者が現れた！</div>
  </div>

  <div id="title-screen" class="screen">
    <h1 class="logo">ORC<br>SURVIVOR</h1>
    <p class="tagline">〜5分間、勇者を返り討て〜</p>
    <p id="highscore"></p>
    <div id="stage-select">
      <button class="stage on" data-stage="grass">🌳 オークの森<small>ふつう</small></button>
      <button class="stage" data-stage="snow">⛄ 雪原の国境<small>むずかしい ・ スコア×1.5</small></button>
      <button class="stage" data-stage="hell">🔥 勇者の本国<small>じごく ・ スコア×2</small></button>
    </div>
    <button id="start">ゲーム開始 (SPACE)</button>
    <button id="replay-prologue" class="ghost">📜 物語をみる</button>
    <p class="controls">PC: WASD / 矢印キーで移動 ・ スマホ: 画面をドラッグで移動 ・ 攻撃は自動</p>
    <p class="credit">3Dモデル・効果音・BGMを含む全アセットはコード生成（外部素材不使用）</p>
  </div>

  <div id="prologue" class="screen hidden">
    <div id="prologue-scene"></div>
    <div id="prologue-scrim"></div>
    <div id="prologue-text"></div>
    <div id="prologue-dots"></div>
    <div id="prologue-hint">クリック / SPACE: 次へ　　ESC: スキップ</div>
  </div>

  <div id="ending" class="hidden">
    <div id="ending-scene"></div>
    <div class="letterbox top"></div>
    <div class="letterbox bottom"></div>
    <p id="ending-subtitle"></p>
    <div id="ending-fin" class="hidden">
      <h2>ORC SURVIVOR</h2>
      <p>— 完 —</p>
    </div>
    <div id="ending-hint">クリック / ESC: スキップ</div>
  </div>

  <div id="levelup" class="screen hidden">
    <h2>LEVEL UP!</h2>
    <div id="choices"></div>
  </div>

  <div id="pause" class="screen hidden">
    <h2>PAUSE</h2>
    <label id="volume-label">🔊 音量
      <input type="range" id="volume" min="0" max="100" value="100" />
    </label>
    <button id="resume">再開 (ESC)</button>
    <button id="quit" class="secondary">タイトルへ</button>
  </div>

  <div id="result" class="screen hidden">
    <h2 id="result-headline"></h2>
    <p id="result-story"></p>
    <div id="result-stats"></div>
    <canvas id="card"></canvas>
    <div class="result-buttons">
      <button id="share-x">𝕏 で共有</button>
      <button id="save-card" class="secondary">画像を保存</button>
      <button id="copy-card" class="secondary">画像をコピー</button>
      <button id="retry">もう一度 (SPACE)</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
